    <meta charset="UTF-8" />

    <link rel="stylesheet" href="styles.css" />
    <style>
      :root {
        --accent: #5a1d1d;

      body {
        background: #f0f0f0;

    <header role="banner" class="site-header">
      <nav aria-label="Main Navigation">

        <section class="form-test">
          <form action="/submit" method="POST" enctype="multipart/form-data">
            <fieldset>
              <legend>User Preferences</legend>

              <label for="theme-select">Choose Palette:</label>
              <select id="theme-select" name="palette" required disabled>
                <option value="deep-red">Deep Red</option>
                <option value="info-blue" selected>Info Blue</option>
              </select>

              <div class="input-group">
                <input type="checkbox" id="notify" name="notify" checked />
                <label for="notify">Enable &ldquo;Push&rdquo; Notifications</label>
              </div>

              <button type="submit">Save &amp; Update</button>
            </fieldset>
          </form>
        </section>

        <section class="media-test">
          <figure>
            <img src="placeholder.jpg" alt='A sample image testing "alt" text tokens' loading="lazy" />
            <figcaption>Figure 1: Visual Asset Test</figcaption>
          </figure>

            <circle cx="50" cy="50" r="40" stroke="#1a3a4a" stroke-width="3" fill="#5a1d1d" />
            <path d="M30 30 L70 70" stroke="white" stroke-linecap="round" />
          </svg>
        </section>
